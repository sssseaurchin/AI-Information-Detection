<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>AID – AI Information Detection</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<main class="container">
    <div class="card">
        <div class="header-row">
            <span class="logo-big">AID</span>
            <span class="logo-text">v2.0 - Context Only</span>
        </div>

        <div id="lastInputContainer" class="last-input-preview">
            <img id="previewImage" style="display:none;" />
            <p id="previewText" class="text-preview"></p>
        </div>

        <div id="idleState" class="idle-state">
            <p>Right-click an image or highlight text on any page to begin analysis.</p>
        </div>

        <div id="resultDisplay" class="result-display" style="display:none;">
            <div class="radial" style="--value:0">
                <span class="radial-text">0%</span>
            </div>
            <h3 id="resultLabel"></h3>
            <p id="resultDetails"></p>
        </div>
    </div>
</main>
<script src="script.js" defer></script>
</body>
</html>

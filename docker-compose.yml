services:
  aid-dev:
    build:
      context: ./src
      dockerfile: dockerfile # senin dosya adı küçük harf "dockerfile"
    image: ai-information-detection:dev
    working_dir: /app
    volumes:
      - ./src:/app # kodu hosttan container'a bağla
      - ./Dataset:/data/dataset # Dataset klasörünü mount et
    environment:
      - DATASET_PATH=/data/dataset/train # Dataset path'i environment variable olarak
    command: python -m main
    tty: true
    stdin_open: true

  aid-shell:
    build:
      context: ./src
      dockerfile: dockerfile
    image: ai-information-detection:dev
    working_dir: /app
    volumes:
      - ./src:/app
      - ./Dataset:/data/dataset # Dataset klasörünü mount et
    environment:
      - DATASET_PATH=/data/dataset/train
    command: bash
    tty: true
    stdin_open: true

  aid-train:
    build:
      context: ./src
      dockerfile: dockerfile
    image: ai-information-detection:dev
    working_dir: /app
    volumes:
      - ./src:/app # kodu hosttan container'a bağla
      - ./Dataset:/data/dataset # Dataset klasörünü mount et
    environment:
      - DATASET_PATH=/data/dataset/train # Dataset path'i environment variable olarak
    command: python3 -m cnn.main # CNN training komutu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    tty: true
    stdin_open: true

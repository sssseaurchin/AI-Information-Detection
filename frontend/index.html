<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AID – AI Information Detection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span class="logo-big">AID</span>
    <span class="logo-text">AI<br />Information<br />Detection</span>
  </div>

  <button id="themeToggle" class="theme-toggle">
    🌙
  </button>
</header>

<hr />

<main class="container">

  <h2>Paste the post link below</h2>
  <div>
    <input
            type="text"
            class="input wide"
            placeholder="https://lalala.com/profile/my_awesome/019571afh918f..."
    />
  </div>
  <button class="submit-btn link-analyze" style="position: relative; left: 38% ">Analyze</button>
  <p class="or">Or...</p>

  <div class="card">
    <div class="avatar"></div>
    <div class="username">
      <p>user12345</p>
    </div>
    <input
            type="text"
            class="input"
            placeholder="Paste the text here..."
    />
    <div class="dropzone">
      <p style="color: #888888">Drop the image here</p>
      <button class="upload-btn">Upload</button>
      <button class="remove-btn" aria-label="Remove image">✕</button>
    </div>
    <button class="submit-btn">
      Analyze
    </button>
  </div>

</main>
<script src="config.js"></script>
<script src="script.js" defer></script>
</body>
</html>
